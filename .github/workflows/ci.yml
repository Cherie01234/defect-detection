name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Light deps only: the CI tests don't need torch / model weights.
      # The torch-based integration test is gated behind RUN_HEAVY=1.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow scikit-learn pytest

      - name: Run tests
        run: pytest -q
